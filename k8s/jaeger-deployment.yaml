apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: streaming-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.22
          ports:
            - containerPort: 5775
            - containerPort: 6831
            - containerPort: 16686 # Jaeger UI

